<!DOCTYPE html>
<html>
<head>
    <title>Arrival Modal Debug Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <h1 class="text-2xl font-bold mb-4">Arrival Modal Debug Test</h1>
    
    <div class="mb-4">
        <button onclick="openArrivalModal(150, 'WM-20250810-5A45', 'Test Customer', 'Test Depot', '11-Aug-2025 08:30', 'BB70 XSS', 'TEMU1234567', 'DHL Express', 'G8', '100', '5', 'Test special instructions')" 
                class="inline-block bg-green-600 text-white px-3 py-1 rounded text-xs hover:bg-green-700 cursor-pointer">
            🚛 Process Arrival (TEST)
        </button>
    </div>

    <div class="mb-4">
        <button onclick="console.log('Console test button clicked');" class="bg-blue-500 text-white px-3 py-1 rounded">Test Console Log</button>
    </div>

    <div id="debug-info" class="p-4 bg-gray-100 rounded"></div>

    <!-- Arrival Modal -->
    <div id="arrivalModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden z-50">
        <div class="relative top-20 mx-auto p-5 border w-11/12 md:w-3/4 lg:w-1/2 shadow-lg rounded-md bg-white">
            <div class="mt-3">
                <!-- Modal Header -->
                <div class="flex justify-between items-center pb-4 border-b">
                    <h3 class="text-lg font-semibold text-gray-900">🚛 Vehicle Arrival Processing - DEBUG</h3>
                    <button onclick="closeArrivalModal()" class="text-gray-400 hover:text-gray-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>

                <div id="bookingSummary" class="mt-4 p-4 bg-gray-50 rounded-lg">
                    <!-- Will be populated by JavaScript -->
                </div>

                <!-- Simple form for testing -->
                <form id="arrivalForm" method="POST" class="mt-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Vehicle Registration *</label>
                            <input type="text" id="vehicleRegistration" name="vehicle_registration" required
                                   placeholder="e.g., AB12 CDE"
                                   class="w-full border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Container Number</label>
                            <input type="text" id="containerNumber" name="container_number"
                                   placeholder="e.g., CONT123456"
                                   class="w-full border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Carrier Company *</label>
                            <input type="text" id="carrierCompany" name="carrier_company" required
                                   placeholder="e.g., ABC Transport Ltd"
                                   class="w-full border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Gate Number</label>
                            <input type="text" id="gateNumber" name="gate_number"
                                   placeholder="e.g., G1"
                                   class="w-full border-gray-300 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tipping Location</label>
                            <select id="tippingLocation" name="tipping_location_id" class="w-full border-gray-300 rounded-lg">
                                <option value="">– Select Drop Location –</option>
                                <option value="1">Test Location 1</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Tipping Bay</label>
                            <select id="tippingBay" name="tipping_bay_id" class="w-full border-gray-300 rounded-lg">
                                <option value="">– Select Bay –</option>
                                <option value="1">Bay 1</option>
                                <option value="2">Bay 2</option>
                            </select>
                        </div>
                    </div>

                    <div class="mt-4 p-4 bg-green-50 rounded-lg border border-green-200">
                        <h4 class="font-medium text-green-800 mb-2">📅 Arrival Time:</h4>
                        <p class="text-green-700 font-semibold" id="arrivalTime">Will be recorded as: [Current Time]</p>
                    </div>

                    <div class="mt-6 flex justify-end space-x-4">
                        <button type="button" onclick="closeArrivalModal()" 
                                class="px-6 py-3 bg-gray-300 text-gray-700 rounded-lg hover:bg-gray-400">
                            Cancel
                        </button>
                        <button type="submit" 
                                class="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-semibold">
                            🚛 Mark Vehicle Arrived
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentBookingId = null;

        function openArrivalModal(bookingId, bookingRef, customer, depot, scheduledTime, vehicleReg, containerNum, carrierCompany, gateNum, expectedCases, expectedPallets, specialInstructions) {
            console.log('openArrivalModal called with:', {bookingId, bookingRef, customer, depot, scheduledTime, vehicleReg, containerNum, carrierCompany, gateNum, expectedCases, expectedPallets, specialInstructions});
            
            currentBookingId = bookingId;
            
            document.getElementById('debug-info').innerHTML = `
                <strong>Debug Info:</strong><br>
                Booking ID: ${bookingId}<br>
                Booking Ref: ${bookingRef}<br>
                Customer: ${customer}<br>
                Vehicle Reg: ${vehicleReg}<br>
                Container: ${containerNum}<br>
                Carrier: ${carrierCompany}<br>
                Gate: ${gateNum}
            `;
            
            // Update booking summary
            document.getElementById('bookingSummary').innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                    <div>
                        <strong>Booking:</strong> ${bookingRef}<br>
                        <strong>Customer:</strong> ${customer}
                    </div>
                    <div>
                        <strong>Depot:</strong> ${depot}<br>
                        <strong>Scheduled:</strong> ${scheduledTime}
                    </div>
                    <div>
                        <strong>Expected:</strong> ${expectedCases} cases, ${expectedPallets} pallets
                    </div>
                </div>
            `;

            // Update form action
            const form = document.getElementById('arrivalForm');
            form.action = `/admin/bookings/${bookingId}/arrival`;
            console.log('Form action set to:', form.action);

            // Populate form fields
            document.getElementById('vehicleRegistration').value = vehicleReg || '';
            document.getElementById('containerNumber').value = containerNum || '';
            document.getElementById('carrierCompany').value = carrierCompany || '';
            document.getElementById('gateNumber').value = gateNum || '';

            // Update arrival time display
            const now = new Date();
            const timeString = now.toLocaleString('en-GB', {
                day: '2-digit',
                month: 'short',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('arrivalTime').textContent = `Will be recorded as: ${timeString}`;

            // Show modal
            console.log('Showing modal...');
            document.getElementById('arrivalModal').classList.remove('hidden');
            
            // Focus on vehicle registration field
            setTimeout(() => {
                document.getElementById('vehicleRegistration').focus();
            }, 100);
        }

        function closeArrivalModal() {
            console.log('closeArrivalModal called');
            document.getElementById('arrivalModal').classList.add('hidden');
            currentBookingId = null;
        }

        // Close modal when clicking outside
        document.getElementById('arrivalModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeArrivalModal();
            }
        });

        console.log('Debug script loaded successfully');
    </script>
</body>
</html>
