[build]
builder = "NIXPACKS"

[build.nixpacksPlan.phases.setup]
nixPkgs = ["php84", "php84Extensions.gd", "php84Extensions.imagick", "php84Extensions.pdo", "php84Extensions.pdo_mysql"]
aptPkgs = ["libpng-dev", "libjpeg-dev", "libfreetype6-dev"]

[build.nixpacksPlan.phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-gd"
]

[build.nixpacksPlan.phases.build]
cmds = [
    "npm ci",
    "npm run build"
]

[build.nixpacksPlan.start]
cmd = "php artisan config:clear && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
